name: Daily ad-status refresh + report

# Runs every day at 04:00 UTC (07:00 Cyprus time):
#   1. Calls TikTok /ad/detail/ on ads we haven't checked in 24h
#   2. Logs status changes to tiktok_ad_status_changes
#   3. Generates a markdown report at reports/YYYY-MM-DD.md
#   4. Commits the updated DB + report back to main → Streamlit auto-redeploys

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:    # allow manual run from the Actions tab

# Shared concurrency group across daily / weekly / election-week. All three
# workflows mutate the same politician_ads_public.db and git-push to main.
# Without this, two cron ticks could race — second push fails with non-fast-
# forward and silently loses its DB changes. cancel-in-progress: false so a
# long-running election-week tick at 03:00 doesn't abort the 04:00 daily run.
concurrency:
  group: cyprus-db-write
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # so we can push the updated DB + report back

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install minimal deps (refresh + report + auto-review)
        run: |
          set -euo pipefail
          pip install --quiet requests python-dotenv filelock anthropic pandas

      # Run the test suite BEFORE touching the live DB or hitting the API.
      # If a recent commit broke load_ads()/derive_status()/numeric-handle
      # quirk handling, this catches it before the cron does production
      # damage (e.g. writing garbage rows from a regressed discover script).
      - name: Run regression tests
        run: |
          set -euo pipefail
          python tests/test_pipeline.py
          python tests/test_dashboard_select_completeness.py
          python tests/test_shared_files_sync.py

      # Re-fetch CY ad catalogs for known political-tier advertisers so
      # new ads they post show up daily, not weekly. Runs FIRST (before
      # refresh_ad_statuses.py) because it stamps last_status_check on
      # every ad it processes — so refresh_ad_statuses.py --since 24h
      # skips those advertisers entirely, halving /ad/query/ API calls.
      # Without this ordering, both scripts query /ad/query/ for the same
      # 74 advertisers in the same run, doubling load and causing 429s.
      - name: Refresh known advertisers' catalogs
        env:
          TIKTOK_CLIENT_KEY:    ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          POLITICIAN_ADS_DB:    politician_ads_public.db
        run: |
          set -euo pipefail
          python refresh_known_catalogs.py

      # Runs AFTER catalog refresh. Because refresh_known_catalogs.py stamps
      # last_status_check for all 74 known advertisers, this step finds almost
      # nothing to do for those (skipped by --since 24h). Its real value here
      # is change tracking: writing to tiktok_ad_status_changes when ad_status
      # flips (drives status_change_report.py + export_tiktok_daily_csv.py).
      # Also catches any ads from advertisers NOT in the catalog refresh list
      # (e.g. recently-discovered accounts not yet in a verified political tier).
      - name: Refresh ad statuses
        env:
          TIKTOK_CLIENT_KEY:    ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          POLITICIAN_ADS_DB:    politician_ads_public.db
        run: |
          set -euo pipefail
          python refresh_ad_statuses.py --since 24h --limit 500

      # Tier-2 enrichment: pulls targeting / age / gender / interest /
      # per-country reach into the DB for any ad we haven't enriched yet.
      # Cap at 300/day to bound the API spend & runtime (≈ 2.5 min). The
      # `--since-days 30` option also re-enriches stale records so targeting
      # changes don't go undetected forever. Without this, the dashboard's
      # targeting/audience columns stay mostly NULL.
      - name: Enrich ad targeting + demographics (tier 2)
        env:
          TIKTOK_CLIENT_KEY:    ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          POLITICIAN_ADS_DB:    politician_ads_public.db
        run: |
          set -euo pipefail
          python tiktok_tier2_fetch.py --limit 300 --since-days 30

      # Re-compute spend estimates for any newly-discovered or
      # newly-refreshed ads. Cheap (no API calls) and idempotent.
      # Without this, freshly-pulled rows have €0 estimates until a
      # human remembers to run it manually.
      - name: Recompute spend estimates for new ads
        env:
          POLITICIAN_ADS_DB: politician_ads_public.db
        run: |
          set -euo pipefail
          python compute_spend_estimates.py --only-null

      # Claude-API second-opinion review of any advertisers promoted
      # in the last 14 days. Catches the class of misclassification we
      # discovered today (@petrouiakovos / @champis_me_p / @marioshaperis)
      # within 24h instead of waiting for a human to notice. ~$0.001 per
      # handle on Haiku → ~$0.10/day worst case if 100 new promotions.
      # ANTHROPIC_API_KEY MUST be set as a repo secret for this to run.
      - name: Auto-review recent promotions
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          POLITICIAN_ADS_DB:  politician_ads_public.db
        run: |
          set -euo pipefail
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::warning::ANTHROPIC_API_KEY secret not set — skipping auto-review."
            echo "Add it via Settings → Secrets and variables → Actions."
            exit 0
          fi
          # Cap at 30 handles to bound the API spend per run. Most days
          # see only a few new promotions; 30 is the rare upper bound.
          python auto_review.py --bucket recent_promotions --limit 30

      - name: Generate daily report
        env:
          POLITICIAN_ADS_DB: politician_ads_public.db
        run: |
          set -euo pipefail
          mkdir -p reports
          DATE=$(date -u +%Y-%m-%d)
          python status_change_report.py --since 24h --output "reports/${DATE}.md"

      # CSV companion to the markdown report — one row per status change
      # + an aggregated summary. Lands in reports/daily/ alongside the
      # markdown. User pulls both with one `git pull`. Date-stamped +
      # non-overwriting: a re-run the same day adds an _HHMM suffix.
      - name: Generate daily CSV (changes + summary)
        env:
          POLITICIAN_ADS_DB: politician_ads_public.db
        run: |
          set -euo pipefail
          python export_tiktok_daily_csv.py --since 24h

      # Drop content_keyword + FP + numeric-handle rows that discovery
      # may have written. Mirrors build_public_db.py's filter so the
      # public DB stays "verified political ads only" instead of leaking
      # raw keyword hits to the dashboard (the 483-row pollution on
      # 2026-05-20 was caused by this missing step).
      - name: Strip non-public rows before commit
        env:
          POLITICIAN_ADS_DB: politician_ads_public.db
        run: |
          set -euo pipefail
          python strip_public_db.py

      - name: Commit + push if anything changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add politician_ads_public.db reports/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto: daily ad-status refresh $(date -u +%Y-%m-%d)"
            # Rebase before push: _checkpoint_push() inside refresh_ad_statuses.py
            # may have committed mid-run, or an election-week tick queued behind
            # us could have pushed while this job ran. Without the rebase the push
            # fails with "non-fast-forward" and the reports are lost.
            git pull --rebase origin main
            git push
          fi

      # Loud-fail step — runs only if any previous step failed. Without this,
      # silent crashes (rate limit, OAuth, schema mismatch) were treated as
      # successful runs and the dashboard would silently go stale.
      - name: Report failure
        if: failure()
        run: |
          echo "::error title=Daily refresh FAILED::A previous step exited non-zero — dashboard data may be stale."
          echo "Check the step logs above for the actual error. Common causes:"
          echo "  - TIKTOK_CLIENT_KEY / TIKTOK_CLIENT_SECRET secrets expired or rotated"
          echo "  - TikTok API rate-limit storm (RateLimitExceeded raised)"
          echo "  - DB schema drift (new column added to refresh script not present in public DB)"
          exit 1
